
version: 2

project_name: cli-template

before:
  hooks:
    # Tidy and verify dependencies
    - go mod tidy
    - go mod verify
    # Run tests to ensure quality before release
    - go test ./...

builds:
  - id: cli-template
    main: ./cmd/cli-template
    binary: cli-template
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"
    ignore:
      # Skip 32-bit builds
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
      - -X github.com/dl-alexandre/cli-tools/version.Version={{.Version}}
      - -X github.com/dl-alexandre/cli-tools/version.GitCommit={{.Commit}}
      - -X github.com/dl-alexandre/cli-tools/version.BuildTime={{.Date}}
    flags:
      - -trimpath

archives:
  - id: cli-template
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - completions/*
    wrap_in_directory: true

checksum:
  name_template: "checksums.txt"
  algorithm: blake3

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^.*feat[/(].*"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix[/(].*"
      order: 1
    - title: Improvements
      regexp: "^.*improve[/(].*"
      order: 2
    - title: Documentation
      regexp: "^.*docs[/(].*"
      order: 3
    - title: Other
      order: 999

release:
  github:
    owner: dl-alexandre
    name: cli-template
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## cli-template v{{.Version}}
    
    Full Changelog: https://github.com/dl-alexandre/cli-template/compare/{{.PreviousTag}}...v{{.Version}}
  footer: |
    ## Installation
    
    ### macOS/Linux (Homebrew)
    ```bash
    brew tap dl-alexandre/tap
    brew install cli-template
    ```
    
    ### Binary Download
    Download the appropriate binary for your platform from the assets below.
    
    ### Verification
    Verify checksums:
    ```bash
    b3sum -c checksums.txt
    ```

brews:
  - name: cli-template
    repository:
      owner: dl-alexandre
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: master
      pull_request:
        enabled: false
    commit_author:
      name: goreleaserbot
      email: bot@dl-alexandre.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    description: "Production-ready Go CLI template"
    homepage: "https://github.com/dl-alexandre/cli-template"
    license: "MIT"
    skip_upload: "{{ if index .Env \"HOMEBREW_TAP_TOKEN\" }}false{{ else }}true{{ end }}"

